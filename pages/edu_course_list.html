<link rel="stylesheet" href="../retail-ai.css">
<h2 class="screen-caption">Course List — 브랜드/교육유형/진행상태로 필터링해 교육과정을 카드형으로 탐색하는 화면.</h2>

      <option>전체 브랜드</option>
      <option>더미식</option>
      <option>용가리</option>
      <option>자연실록</option>
      <option>삼계탕</option>
    </select>
    <select style="border:1px solid var(--border); border-radius:10px; padding:8px 10px; font-size:12.5px; color:var(--text-secondary);">
      <option>전체 교육유형</option>
      <option>필수교육</option>
      <option>제품교육</option>

      <option>완료</option>
      <option>진행중</option>
      <option>미수료</option>
    </select>

    <div class="card" style="overflow:hidden; cursor:pointer;" data-page="edu-course-detail">

      <div style="padding:14px;">
        <span class="badge" style="background:var(--bg-danger); color:var(--text-danger); font-size:10.5px; margin-bottom:6px;">필수교육</span>

        <div style="font-size:11.5px; color:var(--text-muted); margin-top:4px;">15분 · 난이도 하</div>
        <div style="height:6px; background:var(--surface-2); border-radius:999px; margin-top:10px; overflow:hidden;">
          <div style="height:100%; width:0%; background:var(--fill-primary);"></div>
        </div>
      </div>
    </div>

    <div class="card" style="overflow:hidden; cursor:pointer;" data-page="edu-course-detail">

        <div style="font-size:13.5px; font-weight:600; margin-top:8px;">자연실록 제품 소개</div>

        </div>
      </div>
    </div>

    <div class="card" style="overflow:hidden; cursor:pointer;" data-page="edu-course-detail">
      <div style="height:100px; background:var(--surface-2); display:flex; align-items:center; justify-content:center; font-size:28px;">🍲</div>
      <div style="padding:14px;">
        <span class="badge" style="background:var(--bg-accent); color:var(--text-accent); font-size:10.5px;">제품교육</span>
