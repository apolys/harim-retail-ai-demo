<!DOCTYPE html><html lang='ko'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>M1 AI Shelf Scoring</title>
<link rel="stylesheet" href="../retail-ai.css">
<style>
:root{
--bg:#f3f6fb;--card:#fff;--surface-1:#fff;--surface-2:#eef3f8;--border:#d8e1ec;
--text:#1f2937;--text-secondary:#6b7280;--text-success:#16a34a;--text-warning:#f59e0b;--text-danger:#dc2626;
--fill-primary:#2563eb;--on-primary:#fff;--radius:14px;
}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#edf3fb,#f7f9fc);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Pretendard',sans-serif;color:var(--text);display:flex;justify-content:center;padding:28px}
.sr-only{display:none}
.phone{width:360px;background:var(--card);border-radius:28px;box-shadow:0 20px 50px rgba(0,0,0,.12);padding:18px}
</style></head><body><div class='phone'>
<h2 class="screen-caption">M1 AI 매대 스코어링 — 판촉사원 모바일 촬영 결과 화면. 매대 사진 위에 AI가 인식한 SKU 박스를 표시하고, 하단에 항목별 점수와 종합 점수를 보여준다.</h2>
<div style="max-width:320px; margin:0 auto; background:var(--surface-1); border-radius:20px; padding:12px;">
  <div style="font-size:13px; font-weight:500; margin-bottom:8px; padding:0 4px;">촬영 결과 · 이마트 해운대점 냉장 매대</div>
  <div style="position:relative; background:var(--surface-2); border-radius:12px; height:200px; overflow:hidden;">
    <svg width="100%" height="100%" viewBox="0 0 280 200">
      <rect x="0" y="0" width="280" height="200" fill="var(--surface-2)"/>
      <line x1="0" y1="60" x2="280" y2="60" stroke="var(--border)" stroke-width="1"/>
      <line x1="0" y1="130" x2="280" y2="130" stroke="var(--border)" stroke-width="1"/>
      <rect x="20" y="15" width="38" height="38" rx="3" fill="none" stroke="#639922" stroke-width="1.5"/>
      <rect x="66" y="15" width="38" height="38" rx="3" fill="none" stroke="#639922" stroke-width="1.5"/>
      <rect x="112" y="15" width="38" height="38" rx="3" fill="none" stroke="#639922" stroke-width="1.5"/>
      <rect x="158" y="15" width="38" height="38" rx="3" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="3 2"/>
      <text x="177" y="10" text-anchor="middle" font-size="9" fill="#A32D2D">품절</text>
      <rect x="204" y="15" width="38" height="38" rx="3" fill="none" stroke="#639922" stroke-width="1.5"/>
      <rect x="20" y="85" width="38" height="38" rx="3" fill="none" stroke="#639922" stroke-width="1.5"/>
      <rect x="66" y="85" width="38" height="38" rx="3" fill="none" stroke="#BA7517" stroke-width="1.5"/>
      <text x="85" y="80" text-anchor="middle" font-size="9" fill="#854F0B">가격오류</text>
      <rect x="112" y="85" width="38" height="38" rx="3" fill="none" stroke="#639922" stroke-width="1.5"/>
      <rect x="158" y="85" width="38" height="38" rx="3" fill="none" stroke="#639922" stroke-width="1.5"/>
      <rect x="204" y="85" width="38" height="38" rx="3" fill="none" stroke="#639922" stroke-width="1.5"/>
    </svg>
  </div>
  <div style="display:flex; align-items:center; justify-content:space-between; margin:14px 4px 10px;">
    <span style="font-size:13px; color:var(--text-secondary);">종합 스코어</span>
    <span style="font-size:26px; font-weight:500; color:var(--text-warning);">78점</span>
  </div>
  <div style="display:flex; flex-direction:column; gap:6px; padding:0 4px;">
    <div style="display:flex; justify-content:space-between; font-size:12px;"><span>재고가용성</span><span style="color:var(--text-danger);">72 / 100</span></div>
    <div style="display:flex; justify-content:space-between; font-size:12px;"><span>플래노그램 준수</span><span style="color:var(--text-success);">95 / 100</span></div>
    <div style="display:flex; justify-content:space-between; font-size:12px;"><span>가격 정합성</span><span style="color:var(--text-warning);">80 / 100</span></div>
    <div style="display:flex; justify-content:space-between; font-size:12px;"><span>POP 부착</span><span style="color:var(--text-success);">100 / 100</span></div>
  </div>
  <button style="width:100%; margin-top:14px; background:var(--fill-primary); color:var(--on-primary); border:none; border-radius:var(--radius); padding:12px; font-size:14px;">이슈 2건 조치하기</button>
</div>
</div></body></html>
