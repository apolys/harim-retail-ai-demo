<link rel="stylesheet" href="../retail-ai.css">
<h2 class="screen-caption">Video Learning — 영상 플레이어로 학습하며 진행률/배속/이어보기를 지원하고, 영상 완료 시 다음 단계(학습자료)가 활성화된다.</h2>

<div style="max-width:640px; margin:0 auto;">

  <div class="card" style="overflow:hidden; margin-bottom:14px;">
    <div style="aspect-ratio:16/9; background:#1a1a18; display:flex; align-items:center; justify-content:center; position:relative;">
      <span style="font-size:44px;">▶️</span>
      <span style="position:absolute; bottom:10px; left:14px; color:#FAEEDA; font-size:11.5px;">더미식 신제품 매대 진열 가이드</span>
    </div>
    <div style="padding:14px 16px;">
      <div id="edu-video-progress-track" style="height:6px; background:var(--surface-2); border-radius:999px; overflow:hidden; cursor:pointer;">
        <div id="edu-video-progress-bar" style="height:100%; width:68%; background:var(--fill-primary);"></div>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
        <span id="edu-video-time" style="font-size:12px; color:var(--text-secondary);">12:30 / 18:00</span>
        <div style="display:flex; gap:8px; align-items:center;">
          <select id="edu-video-speed" style="border:1px solid var(--border); border-radius:8px; padding:5px 8px; font-size:12px;">
            <option value="0.75">0.75x</option>
            <option value="1" selected>1.0x</option>
            <option value="1.25">1.25x</option>
            <option value="1.5">1.5x</option>
            <option value="2">2.0x</option>
          </select>
          <button id="edu-video-fullscreen" style="font-size:12px; padding:8px 10px;">⛶ 전체화면</button>
        </div>
      </div>
    </div>
  </div>

  <div class="card" style="padding:16px 18px; margin-bottom:14px; display:flex; align-items:center; justify-content:between; gap:10px;">
    <button id="edu-video-complete-btn" style="flex:1;">이어보기 (남은 5:30 완료 처리)</button>
  </div>

  <div id="edu-video-next-locked" class="card" style="padding:16px 18px; display:flex; align-items:center; gap:10px; opacity:0.5;">
    <span style="font-size:16px;">🔒</span>
    <span style="font-size:13px; flex:1;">다음 단계: 학습자료 — 영상을 100% 완료하면 열립니다</span>
  </div>
  <div id="edu-video-next-unlocked" class="card" style="padding:16px 18px; display:none; align-items:center; gap:10px; cursor:pointer;" data-page="edu-materials">
    <span style="font-size:16px;">📄</span>
    <span style="font-size:13px; flex:1; font-weight:500;">다음 단계: 학습자료로 이동</span>
    <span style="color:var(--text-accent);">→</span>
  </div>

</div>

<script>
  var eduVideoProgressBar = document.getElementById("edu-video-progress-bar");
  var eduVideoTimeLabel = document.getElementById("edu-video-time");
  var eduVideoCompleteBtn = document.getElementById("edu-video-complete-btn");
  var eduVideoNextLocked = document.getElementById("edu-video-next-locked");
  var eduVideoNextUnlocked = document.getElementById("edu-video-next-unlocked");

  function eduVideoMarkComplete(){
    eduVideoProgressBar.style.width = "100%";
    eduVideoTimeLabel.textContent = "18:00 / 18:00 · 완료";
    eduVideoCompleteBtn.textContent = "학습 완료됨";
    eduVideoCompleteBtn.disabled = true;
    eduVideoNextLocked.style.display = "none";
    eduVideoNextUnlocked.style.display = "flex";
  }

  if (eduVideoCompleteBtn) {
    eduVideoCompleteBtn.addEventListener("click", eduVideoMarkComplete);
  }
</script>
