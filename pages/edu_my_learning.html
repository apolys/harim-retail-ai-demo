<link rel="stylesheet" href="../retail-ai.css">
<h2 class="screen-caption">My Learning — 전체/완료/진행중/미수료 탭으로 나의 교육이력과 시험점수를 확인하는 화면.</h2>

<div style="max-width:760px; margin:0 auto;">

  <div style="display:flex; gap:6px; margin-bottom:16px;">
    <button class="edu-my-tab-btn active" data-tab="all" style="background:var(--fill-primary); color:var(--on-primary); font-size:12.5px; padding:9px 16px;">전체</button>
    <button class="edu-my-tab-btn" data-tab="done" style="background:var(--surface-2); color:var(--text-primary); box-shadow:none; font-size:12.5px; padding:9px 16px;">완료</button>
    <button class="edu-my-tab-btn" data-tab="progress" style="background:var(--surface-2); color:var(--text-primary); box-shadow:none; font-size:12.5px; padding:9px 16px;">진행중</button>
    <button class="edu-my-tab-btn" data-tab="none" style="background:var(--surface-2); color:var(--text-primary); box-shadow:none; font-size:12.5px; padding:9px 16px;">미수료</button>
  </div>

  <div style="display:flex; flex-direction:column; gap:8px;">

    <div class="edu-my-row" data-status="done" style="display:flex; align-items:center; gap:12px; background:var(--surface-1); border-radius:var(--radius); padding:12px 16px; box-shadow:var(--shadow-sm);">
      <div style="flex:1;">
        <div style="font-size:13px; font-weight:600;">복장 및 안전수칙</div>
        <div style="font-size:11.5px; color:var(--text-muted); margin-top:2px;">완료일 2026.06.28 · 시험점수 88점</div>
      </div>
      <span class="badge" style="background:var(--bg-success); color:var(--text-success);">완료</span>
    </div>

    <div class="edu-my-row" data-status="done" style="display:flex; align-items:center; gap:12px; background:var(--surface-1); border-radius:var(--radius); padding:12px 16px; box-shadow:var(--shadow-sm);">
      <div style="flex:1;">
        <div style="font-size:13px; font-weight:600;">고객응대 매뉴얼</div>
        <div style="font-size:11.5px; color:var(--text-muted); margin-top:2px;">완료일 2026.07.01 · 시험점수 95점</div>
      </div>
      <span class="badge" style="background:var(--bg-success); color:var(--text-success);">완료</span>
    </div>

    <div class="edu-my-row" data-status="progress" style="display:flex; align-items:center; gap:12px; background:var(--surface-1); border-radius:var(--radius); padding:12px 16px; box-shadow:var(--shadow-sm); cursor:pointer;" data-page="edu-video">
      <div style="flex:1;">
        <div style="font-size:13px; font-weight:600;">더미식 신제품 매대 진열 가이드</div>
        <div style="font-size:11.5px; color:var(--text-muted); margin-top:2px;">영상 68% 진행 중</div>
      </div>
      <span class="badge" style="background:var(--bg-accent); color:var(--text-accent);">진행중</span>
    </div>

    <div class="edu-my-row" data-status="progress" style="display:flex; align-items:center; gap:12px; background:var(--surface-1); border-radius:var(--radius); padding:12px 16px; box-shadow:var(--shadow-sm);">
      <div style="flex:1;">
        <div style="font-size:13px; font-weight:600;">용가리 행사 운영법</div>
        <div style="font-size:11.5px; color:var(--text-muted); margin-top:2px;">영상 10% 진행 중</div>
      </div>
      <span class="badge" style="background:var(--bg-accent); color:var(--text-accent);">진행중</span>
    </div>

    <div class="edu-my-row" data-status="none" style="display:flex; align-items:center; gap:12px; background:var(--surface-1); border-radius:var(--radius); padding:12px 16px; box-shadow:var(--shadow-sm);">
      <div style="flex:1;">
        <div style="font-size:13px; font-weight:600;">자연실록 제품 소개</div>
        <div style="font-size:11.5px; color:var(--text-muted); margin-top:2px;">시작 전 · 마감 D-14</div>
      </div>
      <span class="badge" style="background:var(--surface-3); color:var(--text-muted);">미수료</span>
    </div>

  </div>

</div>

<script>
  var eduMyTabButtons = document.querySelectorAll(".edu-my-tab-btn");
  var eduMyRows = document.querySelectorAll(".edu-my-row");

  function eduMySetTab(tab){
    eduMyTabButtons.forEach(function(btn){
      if (btn.dataset.tab === tab) {
        btn.style.background = "var(--fill-primary)";
        btn.style.color = "var(--on-primary)";
        btn.style.boxShadow = "var(--shadow-sm)";
      } else {
        btn.style.background = "var(--surface-2)";
        btn.style.color = "var(--text-primary)";
        btn.style.boxShadow = "none";
      }
    });
    eduMyRows.forEach(function(row){
      if (tab === "all" || row.dataset.status === tab) {
        row.style.display = "flex";
      } else {
        row.style.display = "none";
      }
    });
  }

  eduMyTabButtons.forEach(function(btn){
    btn.addEventListener("click", function(){ eduMySetTab(btn.dataset.tab); });
  });
</script>
